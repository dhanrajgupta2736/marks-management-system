<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; color: #111827; }

  header {
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    color: #fff; padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .header-left { display:flex; align-items:center; gap:12px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub   { font-size: 12px; opacity:.75; margin-top:2px; }
  .logout-btn {
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
    color:#fff; padding:7px 16px; border-radius:8px; font-size:13px; cursor:pointer;
  }
  .logout-btn:hover { background:rgba(255,255,255,.25); }

  main { max-width:1200px; margin:24px auto; padding:0 20px; }

  /* ── TABS ── */
  .tabs { display:flex; gap:4px; margin-bottom:20px; background:#fff; padding:6px; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.07); width:fit-content; }
  .tab-btn {
    padding:9px 20px; border-radius:8px; border:none; background:transparent;
    font-size:14px; font-weight:600; color:#6b7280; cursor:pointer; transition:all .2s;
  }
  .tab-btn.active { background:#4f46e5; color:#fff; }

  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* ── CARDS ── */
  .card { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:20px; }
  .card-header { padding:18px 24px; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; justify-content:space-between; }
  .card-header h2 { font-size:16px; font-weight:700; color:#1e1b4b; }
  .card-body { padding:24px; }

  /* ── FORM ── */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  label { font-size:13px; font-weight:600; color:#374151; }
  input, select {
    padding:10px 13px; border:1.5px solid #d1d5db; border-radius:8px;
    font-size:14px; color:#111827; outline:none; transition:border-color .2s;
  }
  input:focus, select:focus { border-color:#4f46e5; }
  .hint { font-size:11px; color:#9ca3af; margin-top:2px; }

  .btn { padding:10px 22px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .2s; }
  .btn-primary { background:#4f46e5; color:#fff; }
  .btn-primary:hover { opacity:.9; }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
  .btn-outline { background:#fff; color:#4f46e5; border:2px solid #4f46e5; }
  .btn-outline:hover { background:#eef2ff; }

  .alert { padding:11px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
  .alert-success { background:#dcfce7; color:#166534; border:1px solid #bbf7d0; }
  .alert-error   { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }

  /* ── TABLE ── */
  table { width:100%; border-collapse:collapse; }
  thead tr { background:#f9fafb; }
  th { padding:11px 14px; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:#6b7280; font-weight:600; border-bottom:1px solid #e5e7eb; text-align:left; }
  td { padding:12px 14px; font-size:14px; color:#374151; border-bottom:1px solid #f3f4f6; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#f9fafb; }
  .badge { display:inline-block; padding:3px 10px; border-radius:99px; font-size:12px; font-weight:600; }
  .badge-green  { background:#dcfce7; color:#166534; }
  .badge-yellow { background:#fef9c3; color:#854d0e; }
  .badge-red    { background:#fee2e2; color:#991b1b; }

  .action-btn { padding:5px 12px; font-size:12px; font-weight:600; border-radius:6px; border:none; cursor:pointer; }
  .view-btn  { background:#eef2ff; color:#4f46e5; }
  .view-btn:hover { background:#e0e7ff; }

  .loading { text-align:center; padding:40px; color:#6b7280; }
  .spinner { width:32px; height:32px; border:3px solid #e5e7eb; border-top-color:#4f46e5; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── MARKS PREVIEW ── */
  #marks-preview { margin-top:20px; display:none; }
  #calc-preview { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:12px 16px; font-size:13px; color:#166534; margin-top:12px; display:none; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span style="font-size:20px">👩‍🏫</span>
    <div>
      <div class="header-title">Admin Dashboard</div>
      <div class="header-sub" id="header-sub">Loading...</div>
    </div>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<main>
  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('students')">All Students</button>
    <button class="tab-btn" onclick="showTab('view-marks')">View Marks</button>
    <button class="tab-btn" onclick="showTab('add-marks')">Add Marks</button>
    <button class="tab-btn" onclick="showTab('update-marks')">Update Marks</button>
    <button class="tab-btn" onclick="showTab('add-student')">Add Student</button>
  </div>

  <!-- ── TAB: ALL STUDENTS ── -->
  <div class="tab-panel active" id="tab-students">
    <div class="card">
      <div class="card-header">
        <h2>Registered Students</h2>
        <button class="btn btn-outline" onclick="loadStudents()">↻ Refresh</button>
      </div>
      <div id="students-table"><div class="loading"><div class="spinner"></div>Loading...</div></div>
    </div>
  </div>

  <!-- ── TAB: VIEW MARKS ── -->
  <div class="tab-panel" id="tab-view-marks">
    <div class="card">
      <div class="card-header"><h2>View Student Marks</h2></div>
      <div class="card-body">
        <div style="display:flex;gap:12px;align-items:flex-end">
          <div class="form-group" style="flex:1">
            <label>Student PRN</label>
            <input type="text" id="view-prn" placeholder="Enter 12-digit PRN" />
          </div>
          <button class="btn btn-primary" onclick="viewMarks()">View Marks</button>
        </div>
        <div id="marks-preview"></div>
      </div>
    </div>
  </div>

  <!-- ── TAB: ADD MARKS ── -->
  <div class="tab-panel" id="tab-add-marks">
    <div class="card">
      <div class="card-header"><h2>Add Marks</h2></div>
      <div class="card-body">
        <div class="alert alert-success" id="add-success"></div>
        <div class="alert alert-error"   id="add-error"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Student PRN</label>
            <input type="text" id="add-prn" placeholder="240105121011" />
          </div>
          <div class="form-group">
            <label>Course Code</label>
            <input type="text" id="add-code" placeholder="NYCT401" />
          </div>
          <div class="form-group full">
            <label>Course Name</label>
            <input type="text" id="add-cname" placeholder="Java Programming" />
          </div>
          <div class="form-group">
            <label>CIA 1 <span style="color:#9ca3af;font-weight:400">(max 10)</span></label>
            <input type="number" id="add-cia1" min="0" max="10" placeholder="0–10" oninput="updatePreview('add')" />
          </div>
          <div class="form-group">
            <label>CIA 2 <span style="color:#9ca3af;font-weight:400">(max 50)</span></label>
            <input type="number" id="add-cia2" min="0" max="50" placeholder="0–50" oninput="updatePreview('add')" />
          </div>
          <div class="form-group">
            <label>CIA 3 <span style="color:#9ca3af;font-weight:400">(max 10)</span></label>
            <input type="number" id="add-cia3" min="0" max="10" placeholder="0–10" oninput="updatePreview('add')" />
          </div>
          <div class="form-group">
            <label>CIA 4 <span style="color:#9ca3af;font-weight:400">(max 10)</span></label>
            <input type="number" id="add-cia4" min="0" max="10" placeholder="0–10" oninput="updatePreview('add')" />
          </div>
        </div>
        <div id="calc-preview-add" class="calc-preview" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 16px;font-size:13px;color:#166534;margin-top:12px;display:none;"></div>
        <div style="margin-top:20px">
          <button class="btn btn-primary" onclick="addMarks()">Add Marks</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TAB: UPDATE MARKS ── -->
  <div class="tab-panel" id="tab-update-marks">
    <div class="card">
      <div class="card-header"><h2>Update Marks</h2></div>
      <div class="card-body">
        <div class="alert alert-success" id="upd-success"></div>
        <div class="alert alert-error"   id="upd-error"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Student PRN</label>
            <input type="text" id="upd-prn" placeholder="240105121011" />
          </div>
          <div class="form-group">
            <label>Course Code</label>
            <input type="text" id="upd-code" placeholder="NYCT401" />
          </div>
          <div class="form-group">
            <label>CIA 1 <span style="color:#9ca3af;font-weight:400">(max 10)</span></label>
            <input type="number" id="upd-cia1" min="0" max="10" oninput="updatePreview('upd')" />
          </div>
          <div class="form-group">
            <label>CIA 2 <span style="color:#9ca3af;font-weight:400">(max 50)</span></label>
            <input type="number" id="upd-cia2" min="0" max="50" oninput="updatePreview('upd')" />
          </div>
          <div class="form-group">
            <label>CIA 3 <span style="color:#9ca3af;font-weight:400">(max 10)</span></label>
            <input type="number" id="upd-cia3" min="0" max="10" oninput="updatePreview('upd')" />
          </div>
          <div class="form-group">
            <label>CIA 4 <span style="color:#9ca3af;font-weight:400">(max 10)</span></label>
            <input type="number" id="upd-cia4" min="0" max="10" oninput="updatePreview('upd')" />
          </div>
        </div>
        <div id="calc-preview-upd" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 16px;font-size:13px;color:#166534;margin-top:12px;display:none;"></div>
        <div style="margin-top:20px">
          <button class="btn btn-primary" onclick="updateMarks()">Update Marks</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TAB: ADD STUDENT ── -->
  <div class="tab-panel" id="tab-add-student">
    <div class="card">
      <div class="card-header"><h2>Add New Student</h2></div>
      <div class="card-body">
        <div class="alert alert-success" id="stu-success"></div>
        <div class="alert alert-error"   id="stu-error"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>PRN <span style="color:#9ca3af;font-weight:400">(exactly 12 digits)</span></label>
            <input type="text" id="stu-prn" placeholder="240105121014" maxlength="12" />
          </div>
          <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="stu-name" placeholder="Full Name" />
          </div>
          <div class="form-group full">
            <label>Branch</label>
            <input type="text" id="stu-branch" placeholder="B.Tech CSE specialization in CTIS" />
          </div>
          <div class="form-group">
            <label>Login Password</label>
            <input type="password" id="stu-pass" placeholder="Set a password for student" />
          </div>
        </div>
        <div style="margin-top:20px">
          <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const API  = 'https://marks-management-system-efvy.onrender.com';
  const user = JSON.parse(sessionStorage.getItem('user') || 'null');
  if (!user || user.role !== 'admin') window.location.href = 'login.html';

  document.getElementById('header-sub').textContent = user.name + '  |  Admin';

  // ── TABS ──
  function showTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'students') loadStudents();
  }

  // ── LOAD STUDENTS ──
  async function loadStudents() {
    document.getElementById('students-table').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
    try {
      const res  = await fetch(API + '/api/students', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
      const data = await res.json();
      if (!data.students.length) {
        document.getElementById('students-table').innerHTML = '<div class="loading">No students registered yet.</div>';
        return;
      }
      const rows = data.students.map(s => `
        <tr>
          <td><strong>${s.prn}</strong></td>
          <td>${s.name}</td>
          <td>${s.branch}</td>
          <td>
            <button class="action-btn view-btn" onclick="quickView('${s.prn}')">View Marks</button>
          </td>
        </tr>`).join('');
      document.getElementById('students-table').innerHTML = `
        <table>
          <thead><tr><th>PRN</th><th>Name</th><th>Branch</th><th>Action</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } catch(e) {
      document.getElementById('students-table').innerHTML = '<div class="loading">Error loading students.</div>';
    }
  }

  // ── VIEW MARKS ──
  async function viewMarks() {
    const prn = document.getElementById('view-prn').value.trim();
    if (!prn) return;
    document.getElementById('marks-preview').style.display = 'block';
    document.getElementById('marks-preview').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
    await renderMarks(prn, 'marks-preview');
  }

  async function quickView(prn) {
    showTab('view-marks');
    document.getElementById('view-prn').value = prn;
    document.querySelector('.tab-btn').classList.remove('active');
    setTimeout(() => viewMarks(), 100);
  }

  async function renderMarks(prn, containerId) {
    try {
      const res  = await fetch(API + '/api/marks', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({prn}) });
      const data = await res.json();
      if (!data.marks || !data.marks.length) {
        document.getElementById(containerId).innerHTML = '<div class="loading">No marks found for PRN: ' + prn + '</div>';
        return;
      }
      const grandTotal = data.marks.reduce((s,m) => s+m.total, 0);
      const rows = data.marks.map(m => `
        <tr>
          <td><strong>${m.code}</strong></td><td>${m.name}</td>
          <td>${m.cia1}</td><td>${m.cia2}</td><td>${m.cia2c}</td>
          <td>${m.cia3}</td><td>${m.cia4}</td>
          <td><span class="badge ${badgeClass(m.total)}">${m.total}</span></td>
        </tr>`).join('');
      document.getElementById(containerId).innerHTML = `
        <div style="margin:16px 0 10px;font-size:14px;color:#374151">
          <strong>${data.studentName}</strong> &nbsp;|&nbsp; PRN: ${prn} &nbsp;|&nbsp; ${data.studentBranch}
          &nbsp;|&nbsp; Grand Total: <strong>${grandTotal}</strong>
        </div>
        <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Code</th><th>Course Name</th><th>CIA1</th><th>CIA2</th><th>CIA2 Conv.</th><th>CIA3</th><th>CIA4</th><th>Total</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
    } catch(e) {
      document.getElementById(containerId).innerHTML = '<div class="loading">Error loading marks.</div>';
    }
  }

  // ── LIVE PREVIEW of auto-calculated values ──
  function updatePreview(prefix) {
    const cia1 = parseInt(document.getElementById(prefix+'-cia1').value) || 0;
    const cia2 = parseInt(document.getElementById(prefix+'-cia2').value) || 0;
    const cia3 = parseInt(document.getElementById(prefix+'-cia3').value) || 0;
    const cia4 = parseInt(document.getElementById(prefix+'-cia4').value) || 0;
    const cia2c = Math.round(cia2 * 20 / 50);
    const total = cia1 + cia2c + cia3 + cia4;
    const el = document.getElementById('calc-preview-'+prefix);
    el.style.display = 'block';
    el.innerHTML = `✦ CIA 2 Converted = <strong>${cia2c} / 20</strong> &nbsp; (${cia2} × 20 ÷ 50) &nbsp;&nbsp; | &nbsp;&nbsp; Total = <strong>${total}</strong> &nbsp; (${cia1} + ${cia2c} + ${cia3} + ${cia4})`;
  }

  // ── ADD MARKS ──
  async function addMarks() {
    const body = {
      prn: v('add-prn'), course_code: v('add-code'), course_name: v('add-cname'),
      cia1: v('add-cia1'), cia2: v('add-cia2'), cia3: v('add-cia3'), cia4: v('add-cia4')
    };
    const data = await post('/api/addmarks', body);
    showAlert('add', data);
  }

  // ── UPDATE MARKS ──
  async function updateMarks() {
    const body = {
      prn: v('upd-prn'), course_code: v('upd-code'),
      cia1: v('upd-cia1'), cia2: v('upd-cia2'), cia3: v('upd-cia3'), cia4: v('upd-cia4')
    };
    const data = await post('/api/updatemarks', body);
    showAlert('upd', data);
  }

  // ── ADD STUDENT ──
  async function addStudent() {
    const body = { prn: v('stu-prn'), name: v('stu-name'), branch: v('stu-branch'), password: v('stu-pass') };
    const data = await post('/api/addstudent', body);
    showAlert('stu', data);
  }

  // ── HELPERS ──
  function v(id) { return document.getElementById(id).value.trim(); }

  async function post(endpoint, body) {
    try {
      const res = await fetch(API + endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      return await res.json();
    } catch(e) { return { success: false, error: 'Network error' }; }
  }

  function showAlert(prefix, data) {
    const s = document.getElementById(prefix+'-success');
    const e = document.getElementById(prefix+'-error');
    s.style.display = 'none'; e.style.display = 'none';
    if (data.success) {
      s.style.display = 'block';
      s.textContent = data.cia2_converted !== undefined
        ? `✓ Success! CIA2 Converted = ${data.cia2_converted}/20  |  Total = ${data.total}`
        : '✓ Done successfully!';
    } else {
      e.style.display = 'block';
      e.textContent = '✗ ' + (data.error || 'Something went wrong');
    }
  }

  function badgeClass(t) { return t >= 40 ? 'badge-green' : t >= 30 ? 'badge-yellow' : 'badge-red'; }

  function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

  loadStudents();
</script>
</body>
</html>
