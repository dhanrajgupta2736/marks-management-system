<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; color: #111827; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    color: #fff; padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-left span { font-size: 20px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub   { font-size: 12px; opacity: .75; margin-top: 2px; }
  .logout-btn {
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
    color: #fff; padding: 7px 16px; border-radius: 8px;
    font-size: 13px; cursor: pointer; transition: background .2s;
  }
  .logout-btn:hover { background: rgba(255,255,255,.25); }

  /* ── MAIN ── */
  main { max-width: 1100px; margin: 28px auto; padding: 0 20px; }

  /* ── INFO CARDS ── */
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 28px; }
  .info-card {
    background: #fff; border-radius: 12px; padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .info-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: #6b7280; margin-bottom: 6px; }
  .info-card .value { font-size: 20px; font-weight: 700; color: #1e1b4b; }
  .info-card .value.small { font-size: 14px; margin-top: 2px; }

  /* ── MARKS TABLE ── */
  .table-card {
    background: #fff; border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden;
  }
  .table-header {
    padding: 18px 24px; border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-header h2 { font-size: 16px; font-weight: 700; color: #1e1b4b; }
  .table-header span { font-size: 12px; color: #6b7280; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f9fafb; }
  th {
    padding: 11px 16px; text-align: left;
    font-size: 12px; text-transform: uppercase; letter-spacing: .6px;
    color: #6b7280; font-weight: 600; border-bottom: 1px solid #e5e7eb;
  }
  td {
    padding: 13px 16px; font-size: 14px; color: #374151;
    border-bottom: 1px solid #f3f4f6;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 99px;
    font-size: 12px; font-weight: 600;
  }
  .badge-green  { background: #dcfce7; color: #166534; }
  .badge-yellow { background: #fef9c3; color: #854d0e; }
  .badge-red    { background: #fee2e2; color: #991b1b; }

  .total-row td { font-weight: 700; background: #eef2ff; color: #1e1b4b; }

  /* ── LOADING ── */
  .loading {
    text-align: center; padding: 60px;
    color: #6b7280; font-size: 15px;
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #e5e7eb;
    border-top-color: #4f46e5; border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span>🎓</span>
    <div>
      <div class="header-title">Marks Management System</div>
      <div class="header-sub" id="header-sub">Loading...</div>
    </div>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<main>
  <div class="info-grid" id="info-grid">
    <div class="info-card"><div class="label">PRN</div><div class="value small" id="info-prn">—</div></div>
    <div class="info-card"><div class="label">Name</div><div class="value small" id="info-name">—</div></div>
    <div class="info-card"><div class="label">Branch</div><div class="value small" id="info-branch">—</div></div>
    <div class="info-card"><div class="label">Total Marks</div><div class="value" id="info-total">—</div></div>
    <div class="info-card"><div class="label">Average / Subject</div><div class="value" id="info-avg">—</div></div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h2>My Marks</h2>
      <span id="table-sub">Academic Year 2024-25</span>
    </div>
    <div id="table-container">
      <div class="loading"><div class="spinner"></div>Loading marks...</div>
    </div>
  </div>
</main>

<script>
  const API  = localStorage.getItem('api_url') || 'http://localhost:8080';
  const user = JSON.parse(sessionStorage.getItem('user') || 'null');

  if (!user || user.role !== 'student') window.location.href = 'login.html';

  document.getElementById('header-sub').textContent = user.name + '  |  PRN: ' + user.prn;
  document.getElementById('info-prn').textContent    = user.prn;
  document.getElementById('info-name').textContent   = user.name;
  document.getElementById('info-branch').textContent = user.branch;

  async function loadMarks() {
    try {
      const res  = await fetch(API + '/api/marks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prn: user.prn })
      });
      const data = await res.json();

      if (!data.success || !data.marks.length) {
        document.getElementById('table-container').innerHTML =
          '<div class="loading">No marks found. Contact your teacher.</div>';
        return;
      }

      // Summary stats
      const grandTotal = data.marks.reduce((s, m) => s + m.total, 0);
      const avg        = (grandTotal / data.marks.length).toFixed(1);
      document.getElementById('info-total').textContent = grandTotal;
      document.getElementById('info-avg').textContent   = avg;

      // Build table
      let rows = data.marks.map(m => `
        <tr>
          <td><strong>${m.code}</strong></td>
          <td>${m.name}</td>
          <td>${m.cia1} <small style="color:#9ca3af">/ 10</small></td>
          <td>${m.cia2} <small style="color:#9ca3af">/ 50</small></td>
          <td>${m.cia2c} <small style="color:#9ca3af">/ 20</small></td>
          <td>${m.cia3} <small style="color:#9ca3af">/ 10</small></td>
          <td>${m.cia4} <small style="color:#9ca3af">/ 10</small></td>
          <td><span class="badge ${badgeClass(m.total)}">${m.total}</span></td>
        </tr>`).join('');

      document.getElementById('table-container').innerHTML = `
        <table>
          <thead><tr>
            <th>Code</th><th>Course Name</th>
            <th>CIA 1</th><th>CIA 2</th><th>CIA 2 Conv.</th>
            <th>CIA 3</th><th>CIA 4</th><th>Total</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;

    } catch (e) {
      document.getElementById('table-container').innerHTML =
        '<div class="loading">Error loading marks. Please try again.</div>';
    }
  }

  function badgeClass(total) {
    if (total >= 40) return 'badge-green';
    if (total >= 30) return 'badge-yellow';
    return 'badge-red';
  }

  function logout() {
    sessionStorage.clear();
    window.location.href = 'login.html';
  }

  loadMarks();
</script>
</body>
</html>
