<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marks Management System</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 12px;
  }
  h1 { font-size: 20px; font-weight: 700; color: #1e1b4b; }
  p.sub { font-size: 13px; color: #6b7280; margin-top: 4px; }

  .role-tabs {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .tab {
    flex: 1; padding: 10px; border: 2px solid #e5e7eb;
    border-radius: 10px; background: #f9fafb;
    font-size: 14px; font-weight: 600; color: #6b7280;
    cursor: pointer; text-align: center; transition: all .2s;
  }
  .tab.active {
    border-color: #4f46e5; background: #eef2ff; color: #4f46e5;
  }

  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input {
    width: 100%; padding: 11px 14px; border: 1.5px solid #d1d5db;
    border-radius: 8px; font-size: 14px; color: #111827;
    outline: none; transition: border-color .2s; margin-bottom: 16px;
  }
  input:focus { border-color: #4f46e5; }

  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: opacity .2s; letter-spacing: .3px;
  }
  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }

  .error {
    background: #fef2f2; border: 1px solid #fecaca;
    color: #dc2626; padding: 10px 14px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }
  .footer-note {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: #9ca3af;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>Marks Management System</h1>
    <p class="sub">B.Tech CSE &nbsp;|&nbsp; 2nd Year</p>
  </div>

  <div class="role-tabs">
    <div class="tab active" id="tab-student" onclick="setRole('student')">🧑‍🎓 Student</div>
    <div class="tab" id="tab-admin" onclick="setRole('admin')">👩‍🏫 Admin</div>
  </div>

  <div class="error" id="error-msg"></div>

  <label for="prn">PRN Number</label>
  <input type="text" id="prn" placeholder="Enter your 12-digit PRN" maxlength="20" />

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Enter password" />

  <button class="btn" id="login-btn" onclick="doLogin()">Login</button>

  <div class="footer-note">Micro Project &nbsp;|&nbsp; Java + MySQL &nbsp;|&nbsp; SIH Theme</div>
</div>

<script>
  // ── CONFIG: replace with your Railway backend URL after deployment ──
  const API = 'https://marks-management-system-efvy.onrender.com';

  let role = 'student';

  function setRole(r) {
    role = r;
    document.getElementById('tab-student').classList.toggle('active', r === 'student');
    document.getElementById('tab-admin').classList.toggle('active', r === 'admin');
    document.getElementById('prn').placeholder = r === 'admin'
      ? 'Enter admin PRN (e.g. ADMIN001)' : 'Enter your 12-digit PRN';
  }

  async function doLogin() {
    const prn      = document.getElementById('prn').value.trim();
    const password = document.getElementById('password').value.trim();
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('login-btn');

    errEl.style.display = 'none';
    if (!prn || !password) { showError('Please enter PRN and password.'); return; }

    btn.disabled = true; btn.textContent = 'Logging in...';

    try {
      const res  = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prn, password, role })
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('user', JSON.stringify(data));
        window.location.href = role === 'admin' ? 'admin.html' : 'student.html';
      } else {
        showError(data.error || 'Invalid credentials.');
      }
    } catch (e) {
      showError('Cannot reach server. Make sure the backend is running.');
    } finally {
      btn.disabled = false; btn.textContent = 'Login';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
